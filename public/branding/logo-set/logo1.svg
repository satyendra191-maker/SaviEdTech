<svg width="600" height="200" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Exact replicate of uploaded Image 3 with increased spacing -->
  
  <!-- Pixel Fragments - Moved further left -->
  <g transform="translate(10, 50)">
    <rect x="0" y="10" width="12" height="12" fill="#004a99" rx="1" />
    <rect x="15" y="0" width="12" height="12" fill="#f58220" rx="1" />
    <rect x="30" y="10" width="12" height="12" fill="#f58220" rx="1" opacity="0.6" />
    <rect x="15" y="25" width="12" height="12" fill="#004a99" rx="1" opacity="0.8" />
  </g>

  <!-- Split-Color S Icon - Moved slightly right to avoid fragments -->
  <g transform="translate(80, 20)">
    <!-- Bottom Navy Curve -->
    <path d="M50,65 C50,110 160,110 160,65 C160,40 50,40 50,-10" 
          stroke="#004a99" stroke-width="26" fill="none" stroke-linecap="round" />
    <!-- Top Orange Curve -->
    <path d="M50,15 C50,-20 160,-20 160,15 C160,40 50,40 50,115" 
          stroke="#f58220" stroke-width="26" fill="none" stroke-linecap="round" />
  </g>

  <!-- Wordmark & Tagline - Moved further right to avoid Icon overlap -->
  <g transform="translate(260, 85)">
    <text font-family="Verdana, Geneva, sans-serif" font-weight="bold" font-size="44" letter-spacing="-1">
      <tspan fill="#004a99">Savi</tspan><tspan fill="#f58220">Edu</tspan><tspan fill="#004a99">Tech</tspan>
    </text>
    <text y="38" font-family="Verdana, Geneva, sans-serif" font-weight="normal" font-size="18" fill="#4d4d4d">
      Empowering Digital Learning
    </text>
  </g>
</svg>
