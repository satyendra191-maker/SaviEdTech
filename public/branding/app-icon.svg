<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="40%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="appShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="appGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#appBg)"/>
  
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="114" fill="url(#appShine)"/>
  
  <!-- Neural S Circuit - large scale -->
  <path d="M 128 348 C 128 348 128 240 208 240 C 288 240 288 176 208 176 C 148 176 128 112 128 112" 
        stroke="#22D3EE" stroke-width="22" stroke-linecap="round" fill="none" filter="url(#appGlow)"/>
  
  <!-- Nodes -->
  <circle cx="128" cy="348" r="26" fill="#22D3EE" filter="url(#appGlow)"/>
  <circle cx="128" cy="348" r="14" fill="white"/>
  
  <circle cx="288" cy="240" r="26" fill="#A78BFA" filter="url(#appGlow)"/>
  <circle cx="288" cy="240" r="14" fill="white"/>
  
  <circle cx="128" cy="112" r="26" fill="#34D399" filter="url(#appGlow)"/>
  <circle cx="128" cy="112" r="14" fill="white"/>
  
  <!-- Mid nodes -->
  <circle cx="208" cy="240" r="18" fill="white" opacity="0.9"/>
  <circle cx="208" cy="176" r="16" fill="white" opacity="0.7"/>
  
  <!-- Accent dots right side -->
  <circle cx="356" cy="148" r="16" fill="#F472B6" opacity="0.8" filter="url(#appGlow)"/>
  <circle cx="376" cy="228" r="12" fill="#22D3EE" opacity="0.6" filter="url(#appGlow)"/>
  <circle cx="360" cy="308" r="14" fill="#A78BFA" opacity="0.7" filter="url(#appGlow)"/>
  
  <!-- Book icon bottom right -->
  <rect x="240" y="312" width="110" height="84" rx="16" fill="white" opacity="0.15"/>
  <rect x="256" y="330" width="78" height="10" rx="5" fill="white" opacity="0.85"/>
  <rect x="256" y="348" width="62" height="8" rx="4" fill="white" opacity="0.65"/>
  <rect x="256" y="364" width="48" height="8" rx="4" fill="white" opacity="0.5"/>
  <line x1="295" y1="312" x2="295" y2="396" stroke="white" stroke-width="3" opacity="0.3"/>
</svg>
