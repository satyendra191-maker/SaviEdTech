<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="iconBgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark mode icon with lighter gradient -->
  <rect x="8" y="8" width="104" height="104" rx="24" fill="url(#iconBgD)" opacity="0.9"/>
  
  <path d="M 35 72 C 35 72 35 52 55 52 C 75 52 75 40 55 40 C 38 40 35 30 35 30" 
        stroke="#67E8F9" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glowD)"/>
  
  <circle cx="35" cy="72" r="5" fill="#67E8F9" filter="url(#glowD)"/>
  <circle cx="75" cy="52" r="5" fill="#C4B5FD" filter="url(#glowD)"/>
  <circle cx="55" cy="52" r="4" fill="white" opacity="0.9"/>
  <circle cx="35" cy="30" r="5" fill="#6EE7B7" filter="url(#glowD)"/>
  <circle cx="55" cy="40" r="4" fill="white" opacity="0.7"/>
  
  <circle cx="82" cy="33" r="3" fill="#FDA4AF" opacity="0.8" filter="url(#glowD)"/>
  <circle cx="90" cy="45" r="2" fill="#67E8F9" opacity="0.6"/>
  
  <rect x="52" y="68" width="22" height="18" rx="3" fill="white" opacity="0.15"/>
  <rect x="55" y="71" width="16" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="55" y="75" width="13" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="55" y="79" width="10" height="2" rx="1" fill="white" opacity="0.5"/>

  <!-- White wordmark for dark backgrounds -->
  <text x="128" y="58" font-family="'Inter', 'Poppins', system-ui, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-1">Savi</text>
  <text x="196" y="58" font-family="'Inter', 'Poppins', system-ui, sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="-1">EduTech</text>
  
  <!-- Tagline for dark -->
  <text x="128" y="82" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(148,163,184,1)" letter-spacing="0.03em">Future of Intelligent Learning</text>
  
  <!-- AI badge dark -->
  <rect x="128" y="90" width="28" height="14" rx="7" fill="rgba(99,102,241,0.3)"/>
  <text x="142" y="101" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="700" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.08em">AI</text>
</svg>
