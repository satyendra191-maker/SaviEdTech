<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glowM"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <rect x="4" y="4" width="112" height="112" rx="32" fill="url(#bgM)"/>
  
  <!-- Large bold S letterform with circuit aesthetic -->
  <text x="60" y="80" font-family="'Inter', 'Poppins', system-ui, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" opacity="0.12">S</text>
  
  <!-- Neural S circuit on top -->
  <path d="M 32 82 C 32 82 32 60 56 60 C 80 60 80 44 56 44 C 36 44 32 28 32 28" 
        stroke="#67E8F9" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glowM)"/>
  
  <circle cx="32" cy="82" r="7" fill="#06B6D4" filter="url(#glowM)"/>
  <circle cx="80" cy="60" r="7" fill="#A78BFA" filter="url(#glowM)"/>
  <circle cx="56" cy="60" r="5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="28" r="7" fill="#34D399" filter="url(#glowM)"/>
  <circle cx="56" cy="44" r="5" fill="white" opacity="0.7"/>
  
  <!-- Sparkle accents -->
  <circle cx="92" cy="36" r="4" fill="#F472B6" opacity="0.8" filter="url(#glowM)"/>
  <circle cx="96" cy="56" r="3" fill="#06B6D4" opacity="0.6" filter="url(#glowM)"/>
  <circle cx="90" cy="76" r="3" fill="#A78BFA" opacity="0.7" filter="url(#glowM)"/>
</svg>
